<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гностика — Библиотека Идей</title>
    <link rel="stylesheet" href="css/стили.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="auth-ov" class="auth-ov hidden">
        <div class="auth-card">
            <h2>ВХОД В СИСТЕМУ</h2>
            <input type="password" id="auth-in" placeholder="Пароль">
            <div class="auth-btns">
                <button class="btn btn-primary" onclick="checkAuth()">ВОЙТИ</button>
                <button class="btn btn-secondary" onclick="closeAuth()">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 onclick="goHome()">ГНОСТИКА</h1>
                <p>БИБЛИОТЕКА ИДЕЙ</p>
            </div>
            <nav id="sidebar-nav" class="nav-list">
                <!-- Категории и авторы будут загружены здесь -->
            </nav>
            <div class="sidebar-footer">
                <button id="admin-btn" onclick="openAuth()">НАСТРОЙКИ</button>
            </div>
        </aside>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div id="breadcrumb" class="breadcrumb">Главная</div>
                <div id="admin-controls" class="admin-controls hidden">
                    <button class="btn btn-sm" onclick="editMode()">РЕДАКТИРОВАТЬ</button>
                    <button class="btn btn-sm btn-danger" onclick="logout()">ВЫЙТИ</button>
                </div>
            </header>

            <div id="stage" class="stage">
                <!-- Сетка идей или детальный вид будут здесь -->
            </div>
        </main>

        <!-- ПРАВАЯ ПАНЕЛЬ (Детали автора / Навигация) -->
        <aside id="info-panel" class="info-panel hidden">
            <div id="author-info" class="author-info">
                <div id="author-photo" class="author-avatar"></div>
                <h3 id="author-name"></h3>
                <p id="author-role"></p>
            </div>
            <nav id="author-nav" class="author-nav-list">
                <!-- Группы идей автора -->
            </nav>
        </aside>
    </div>

    <script src="js/логика.js"></script>
</body>
</html>
